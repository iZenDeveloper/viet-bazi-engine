<!doctype html>
<html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Viet Bazi Engine — Offline Demo</title><link rel="stylesheet" href="./style.css"></head>
<body><main><header><p class="eyebrow">OFFLINE DEMO</p><h1>Viet Bazi Engine</h1><p>Tính Tứ Trụ ngay trong trình duyệt. Dữ liệu không rời khỏi thiết bị.</p></header>
<form id="birth-form"><label>Ngày giờ sinh<input id="localDateTime" type="datetime-local" value="1990-05-17T14:30" required></label><label>UTC offset (phút)<input id="timezoneOffsetMinutes" type="number" min="-840" max="840" value="420" required></label><label>Năm xem Lưu Niên<input id="asOfYear" type="number" min="1600" max="2400" value="2026" required></label><label>Giới tính<select id="gender"><option value="female">Nữ</option><option value="male">Nam</option></select></label><label>Thành phố<select id="city"></select></label><label>Đổi ngày<select id="dayBoundary"><option value="early-zi">23:00 — đầu giờ Tý</option><option value="midnight">00:00 — nửa đêm</option></select></label><label>Ngôn ngữ SVG<select id="locale"><option value="vi">Tiếng Việt</option><option value="en">English</option></select></label><label class="check"><input id="trueSolarTime" type="checkbox" checked> Hiệu chỉnh True Solar Time</label><button type="submit">Lập lá số</button></form>
<section id="status" role="status" aria-live="polite"></section><section id="chart" aria-label="Biểu đồ Bát Tự"></section><div class="actions"><button id="download-svg" disabled>Tải SVG</button><button id="download-json" disabled>Tải JSON</button></div><details><summary>JSON structured output</summary><pre id="output"></pre></details>
<footer>Kết quả chỉ phục vụ nghiên cứu văn hóa, không thay thế tư vấn y tế, pháp lý hoặc tài chính.</footer></main><script type="module" src="./app.js"></script></body></html>
