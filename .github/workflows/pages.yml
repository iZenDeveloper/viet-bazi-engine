name: Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: node scripts/prepare-pages.mjs
      - run: node scripts/test-pages-artifact.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist-pages
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Live smoke test
        run: node scripts/test-pages-live.mjs "${{ steps.deployment.outputs.page_url }}"
