name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: PYTHONPATH=bindings/python python -m unittest discover -s bindings/python/tests -v
